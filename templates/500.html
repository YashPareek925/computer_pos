{% extends 'base.html' %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="text-center mt-5">
    <h1 class="display-1 fw-bold text-warning">500</h1>
    <h3 class="mb-3">Internal Server Error</h3>
    <p class="text-muted">
        Something went wrong on our end. Please try again.
    </p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-dark mt-2">
        Go to Dashboard
    </a>
</div>
{% endblock %}
