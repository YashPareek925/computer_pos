{% extends 'base.html' %}
{% block title %}Edit Product - POS System{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<style>
  .sec-card{background:var(--bg-card);border:0.5px solid var(--border-col);}
  .sec-hdr{
    padding:0.8rem 1.2rem;
    border-bottom:0.5px solid var(--border-col);
    font-size:13px;font-weight:500;
    color:var(--text-main);
    display:flex;align-items:center;gap:8px;
  }
  .field-label{
    display:block;font-size:11px;font-weight:500;
    color:var(--text-label);text-transform:uppercase;
    letter-spacing:0.6px;margin-bottom:6px;
  }
  .field-input{
    width:100%;background:var(--bg-input);
    border:0.5px solid var(--border-col);
    color:var(--text-main);font-family:'Inter',sans-serif;
    font-size:13px;padding:8px 12px;outline:none;
    transition:border-color 0.15s;
  }
  .field-input:focus{border-color:#2563eb;}
  .form-group{display:flex;flex-direction:column;margin-bottom:1.2rem;}
  .btn{
    padding:9px 18px;font-family:'Inter',sans-serif;
    font-size:13px;font-weight:500;border:none;
    cursor:pointer;transition:background 0.15s;
    display:flex;align-items:center;gap:6px;
    text-decoration:none;
  }
  .btn-blue{background:#2563eb;color:#fff;}
  .btn-blue:hover{background:#1d4ed8;}
  .btn-gray{
    background:transparent;
    border:0.5px solid var(--border-col);
    color:var(--text-sub);
  }
  .btn-gray:hover{background:var(--hover-item);}
  .margin-preview{
    background:var(--bg-page);
    border:0.5px solid var(--border-col);
    padding:0.8rem 1rem;
    display:flex;align-items:center;
    justify-content:space-between;
    margin-top:1rem;
  }
</style>

<div style="max-width:520px;">
  <div class="sec-card">
    <div class="sec-hdr">
      <i class="ti ti-edit" style="color:#2563eb;font-size:16px;"></i>
      Edit product — <span style="color:var(--text-sub);font-weight:400;">{{ product[1] }}</span>
    </div>

    <div style="padding:1.5rem;">
      <form method="POST" action="{{ url_for('products.update', id=product[0]) }}">

        <div class="form-group">
          <label class="field-label">Product name</label>
          <input type="text" name="product_name" class="field-input"
                 value="{{ product[1] }}" required>
        </div>

        <div class="form-group">
          <label class="field-label">Stock</label>
          <input type="number" name="stock" class="field-input"
                 value="{{ product[2] }}" min="0" required>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="field-label">Cost price (₹)</label>
            <input type="number" step="0.01" name="cost_price"
                   id="costPrice" class="field-input"
                   value="{{ product[3] }}"
                   required onchange="updateMargin()">
          </div>
          <div class="form-group">
            <label class="field-label">Sales price (₹)</label>
            <input type="number" step="0.01" name="sales_price"
                   id="salesPrice" class="field-input"
                   value="{{ product[4] }}"
                   required onchange="updateMargin()">
          </div>
        </div>

        <!-- Margin Preview -->
        <div class="margin-preview">
          <span style="font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.5px;">
            <i class="ti ti-trending-up" style="font-size:13px;color:#f59e0b;"></i>
            Profit margin
          </span>
          <span id="marginVal" style="font-size:14px;font-weight:500;color:#f59e0b;">
            ₹{{ "%.2f"|format(product[4] - product[3]) }}
          </span>
        </div>

        <div style="display:flex;gap:8px;margin-top:1.5rem;">
          <button type="submit" class="btn btn-blue">
            <i class="ti ti-check" style="font-size:14px;"></i> Update
          </button>
          <a href="{{ url_for('products.index') }}" class="btn btn-gray">
            <i class="ti ti-arrow-left" style="font-size:14px;"></i> Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
function updateMargin() {
  const cost = parseFloat(document.getElementById('costPrice').value) || 0;
  const sales = parseFloat(document.getElementById('salesPrice').value) || 0;
  const margin = sales - cost;
  const el = document.getElementById('marginVal');
  el.textContent = '₹' + margin.toFixed(2);
  el.style.color = margin >= 0 ? '#f59e0b' : '#dc2626';
}
</script>
{% endblock %}
