{% extends 'base.html' %}
{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">Edit Product</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('products.update', id=product[0]) }}">
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="product_name" class="form-control"
                               value="{{ product[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control"
                               value="{{ product[2] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cost Price</label>
                        <input type="number" step="0.01" name="cost_price"
                               class="form-control" value="{{ product[3] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sales Price</label>
                        <input type="number" step="0.01" name="sales_price"
                               class="form-control" value="{{ product[4] }}" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Update</button>
                    <a href="{{ url_for('products.index') }}"
                       class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
