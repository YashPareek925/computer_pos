{% extends 'base.html' %}
{% block title %}Edit Supplier - POS System{% endblock %}
{% block page_title %}Edit Supplier{% endblock %}

{% block content %}
<style>
  .sec-card{background:var(--bg-card);border:0.5px solid var(--border-col);}
  .sec-hdr{
    padding:0.8rem 1.2rem;
    border-bottom:0.5px solid var(--border-col);
    font-size:13px;font-weight:500;color:var(--text-main);
    display:flex;align-items:center;gap:8px;
  }
  .field-label{
    display:block;font-size:11px;font-weight:500;
    color:var(--text-label);text-transform:uppercase;
    letter-spacing:0.6px;margin-bottom:6px;
  }
  .field-input{
    width:100%;background:var(--bg-input);
    border:0.5px solid var(--border-col);
    color:var(--text-main);font-family:'Inter',sans-serif;
    font-size:13px;padding:8px 12px;outline:none;
    transition:border-color 0.15s;
  }
  .field-input:focus{border-color:#2563eb;}
  .form-group{display:flex;flex-direction:column;margin-bottom:1.2rem;}
  .btn{
    padding:9px 18px;font-family:'Inter',sans-serif;
    font-size:13px;font-weight:500;border:none;
    cursor:pointer;transition:background 0.15s;
    display:flex;align-items:center;gap:6px;
    text-decoration:none;
  }
  .btn-blue{background:#2563eb;color:#fff;}
  .btn-blue:hover{background:#1d4ed8;}
  .btn-gray{
    background:transparent;
    border:0.5px solid var(--border-col);
    color:var(--text-sub);
  }
  .btn-gray:hover{background:var(--hover-item);}
</style>

<div style="max-width:520px;">
  <div class="sec-card">
    <div class="sec-hdr">
      <i class="ti ti-edit" style="color:#2563eb;font-size:16px;"></i>
      Edit supplier —
      <span style="color:var(--text-sub);font-weight:400;">{{ supplier[1] }}</span>
    </div>

    <div style="padding:1.5rem;">
      <form method="POST"
            action="{{ url_for('suppliers.update', id=supplier[0]) }}">

        <div class="form-group">
          <label class="field-label">Supplier name</label>
          <input type="text" name="name" class="field-input"
                 value="{{ supplier[1] }}" required>
        </div>

        <div class="form-group">
          <label class="field-label">Contact number</label>
          <input type="tel" name="contact_no" class="field-input"
                 value="{{ supplier[2] or '' }}"
                 pattern="[0-9]{10}" maxlength="10"
                 oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                 required>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="field-label">Email</label>
            <input type="email" name="email" class="field-input"
                   value="{{ supplier[3] or '' }}"
                   placeholder="Email (optional)">
          </div>
          <div class="form-group">
            <label class="field-label">Address</label>
            <input type="text" name="address" class="field-input"
                   value="{{ supplier[4] or '' }}"
                   placeholder="Address (optional)">
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:0.5rem;">
          <button type="submit" class="btn btn-blue">
            <i class="ti ti-check" style="font-size:14px;"></i> Update
          </button>
          <a href="{{ url_for('suppliers.index') }}" class="btn btn-gray">
            <i class="ti ti-arrow-left" style="font-size:14px;"></i> Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
