{% extends 'base.html' %}
{% block title %}Edit Customer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">Edit Customer</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('customers.update', id=customer[0]) }}">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ customer[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control"
                               value="{{ customer[2] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control"
                               value="{{ customer[3] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ customer[4] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">WhatsApp Number</label>
                        <input type="text" name="contact_no" class="form-control"
                               value="{{ customer[5] }}" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Update</button>
                    <a href="{{ url_for('customers.index') }}"
                       class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
